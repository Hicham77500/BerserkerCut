name: QA Regression Gate

on:
  pull_request:
    paths:
      - 'src/**'
      - '__tests__/**'
      - 'jest.config.js'
      - 'jest.setup.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/qa-regression.yml'
  push:
    branches:
      - main
      - master

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: BerserkerCut/package-lock.json

      - name: Install dependencies
        working-directory: BerserkerCut
        run: npm ci

      - name: Run QA regression gate
        working-directory: BerserkerCut
        run: npm run test:ci

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BERSERKERCUT - Health Profile</title>

                      "tertiary-fixed": "#b9ecee",

<style>
        .glass-panel {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 218, 220, 0.1);
        }
        .tech-input {
            background-color: transparent;
            border: none;
            border-bottom: 1px solid #5b403f;
            color: #f9dcda;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: none !important;
        }
        .tech-input:focus {
            border-bottom-color: #ec9e00;
            box-shadow: 0 1px 0 0 #ec9e00 !important;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #433030;
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 0;
            background: #ffb3b1;
            cursor: pointer;
            transition: background 0.15s ease-in-out;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            background: #ff535b;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
<!-- Progress Header -->
<header class="w-full px-margin-mobile py-sm md:px-margin-desktop md:py-lg flex items-center justify-between border-b border-outline-variant/10">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<span class="font-label-technical text-label-technical text-primary tracking-widest uppercase mb-1">Step 2 of 4</span>
<div class="flex gap-2">
<div class="h-1 w-8 bg-primary"></div>
<div class="h-1 w-8 bg-primary"></div>
<div class="h-1 w-8 bg-surface-variant"></div>
<div class="h-1 w-8 bg-surface-variant"></div>
</div>
</div>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-lg md:px-margin-desktop">
<div class="w-full max-w-md">
<div class="mb-xl text-center md:text-left">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary uppercase mb-2">Health Profile</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Calibrate your tactical baseline. Precision data ensures maximum efficiency.</p>
</div>
<div class="glass-panel p-md md:p-lg rounded mb-xl space-y-lg">
<!-- Metrics Grid -->
<div class="grid grid-cols-2 gap-md">
<!-- Weight Input -->
<div class="flex flex-col">
<label class="font-label-technical text-label-technical text-on-surface-variant mb-1 uppercase tracking-wider" for="weight">Weight</label>
<div class="relative flex items-center">
<input class="tech-input font-label-technical text-label-technical w-full py-2 pr-8" id="weight" placeholder="0.0" type="number"/>
<span class="absolute right-0 font-label-technical text-label-technical text-surface-variant">KG</span>
</div>
</div>
<!-- Height Input -->
<div class="flex flex-col">
<label class="font-label-technical text-label-technical text-on-surface-variant mb-1 uppercase tracking-wider" for="height">Height</label>
<div class="relative flex items-center">
<input class="tech-input font-label-technical text-label-technical w-full py-2 pr-8" id="height" placeholder="0" type="number"/>
<span class="absolute right-0 font-label-technical text-label-technical text-surface-variant">CM</span>
</div>
</div>
</div>
<!-- Age Input -->
<div class="flex flex-col">
<label class="font-label-technical text-label-technical text-on-surface-variant mb-1 uppercase tracking-wider" for="age">Age</label>
<div class="relative flex items-center">
<input class="tech-input font-label-technical text-label-technical w-full py-2 pr-8" id="age" placeholder="0" type="number"/>
<span class="absolute right-0 font-label-technical text-label-technical text-surface-variant">YRS</span>
</div>
</div>
<div class="h-px w-full bg-outline-variant/30 my-md"></div>
<!-- Activity Level -->
<div class="flex flex-col">
<div class="flex justify-between items-end mb-2">
<label class="font-label-technical text-label-technical text-on-surface-variant uppercase tracking-wider">Activity Level</label>
<span class="font-label-technical text-label-technical text-primary" id="activity-val">3</span>
</div>
<input class="w-full mb-1" max="5" min="1" oninput="document.getElementById('activity-val').innerText = this.value" type="range" value="3"/>
<div class="flex justify-between font-label-technical text-[10px] text-surface-variant mt-1">
<span>SEDENTARY</span>
<span>BERSERKER</span>
</div>
</div>
<!-- Sleep Quality -->
<div class="flex flex-col">
<div class="flex justify-between items-end mb-2">
<label class="font-label-technical text-label-technical text-on-surface-variant uppercase tracking-wider">Sleep Quality</label>
<span class="font-label-technical text-label-technical text-primary" id="sleep-val">3</span>
</div>
<input class="w-full mb-1" max="5" min="1" oninput="document.getElementById('sleep-val').innerText = this.value" type="range" value="3"/>
<div class="flex justify-between font-label-technical text-[10px] text-surface-variant mt-1">
<span>POOR</span>
<span>OPTIMAL</span>
</div>
</div>
</div>
<!-- Action Area -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-lg-mobile text-headline-lg-mobile py-md uppercase tracking-wider hover:bg-primary transition-colors rounded-none flex items-center justify-center gap-2">
<span>Continue</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
</body></html>
